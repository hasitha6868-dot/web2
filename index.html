<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Special Letter for Kithuni ✉️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&family=Great+Vibes&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #fcedeb;
  --envelope-pink: #f2c6d2;
  --envelope-dark-pink: #e09bb0;
  --seal-maroon: #8c2641;
  --text-dark: #3a3032;
  --accent-gold: #c5a059;
  --rose-pink: #d64b6b;
  --card-width: 90%;
  --card-max-width: 580px
}
* {
  box-sizing:border-box;
  margin:0;
  padding:0
}
body {
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#fcedeb,#eadeec,#fde4ea);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
  position:relative;
  padding:30px 0
}
.petals-container {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  z-index:1
}
.petal {
  position:absolute;
  background:linear-gradient(to bottom right,#fca1b7,#fcd8e2);
  border-radius:15% 70%;
  opacity:.5;
  animation:fall infinite linear
}
@keyframes fall {
  0% {
    transform:translateY(-20px) rotate(0);
    opacity:0
  }
  10% {
    opacity:.6
  }
  90% {
    opacity:.6
  }
  to {
    transform:translateY(105vh) rotate(360deg);
    opacity:0
  }
}
.screen {
  display:none;
  z-index:10;
  width:var(--card-width);
  max-width:var(--card-max-width);
  animation:fadeIn .8s cubic-bezier(.4,0,.2,1) forwards
}
.screen.active {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center
}
@keyframes fadeIn {
  0% {
    opacity:0;
    transform:scale(.95) translateY(15px)
  }
  to {
    opacity:1;
    transform:scale(1) translateY(0)
  }
}
.confetti {
  position:fixed;
  width:10px;
  height:10px;
  background-color:#ff6b8b;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  animation:burst 1.2s cubic-bezier(.1,.8,.3,1) forwards
}
@keyframes burst {
  0% {
    transform:translate(0) scale(1);
    opacity:1
  }
  to {
    transform:translate(var(--tx),var(--ty)) scale(0);
    opacity:0
  }
}
.login-stage {
  position:relative;
  width:100%;
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1200px;
  padding:20px
}
.flower-deco {
  position:absolute;
  width:34px;
  height:34px;
  opacity:.85;
  filter:drop-shadow(0 4px 8px rgba(140,38,65,.2));
  animation:gentleFloat 4s ease-in-out infinite;
  pointer-events:none;
  z-index:1
}
.flower-deco:before,.flower-deco:after {
  content:"";
  position:absolute;
  inset:6px;
  background:radial-gradient(circle,#ffeef5 0 22%,#f5a8bf 24% 58%,transparent 60%);
  border-radius:50% 50% 44% 44%;
  box-shadow:0 -12px #f5a8bf,12px 0 #f5a8bf,0 12px #f5a8bf,-12px 0 #f5a8bf
}
.flower-deco:after {
  inset:12px;
  background:#c5a059;
  box-shadow:none;
  border-radius:50%
}
.flower-deco.f1 {
  top:8%;
  left:5%;
  animation-delay:0s
}
.flower-deco.f2 {
  top:14%;
  right:8%;
  animation-delay:1s
}
.flower-deco.f3 {
  bottom:10%;
  left:8%;
  animation-delay:1.5s
}
.flower-deco.f4 {
  bottom:18%;
  right:5%;
  animation-delay:.7s
}
.flower-deco.f5 {
  top:45%;
  left:3%;
  animation-delay:2s
}
.flower-deco.f6 {
  top:55%;
  right:4%;
  animation-delay:2.3s
}
.flower-deco.f7 {
  bottom:40%;
  left:6%;
  width:26px;
  height:26px;
  animation-delay:.5s
}
.flower-deco.f8 {
  top:30%;
  right:10%;
  width:26px;
  height:26px;
  animation-delay:1.8s
}
@keyframes gentleFloat {
  0%,to {
    transform:translateY(0) rotate(0)
  }
  50% {
    transform:translateY(-10px) rotate(8deg)
  }
}
.butterfly {
  position:fixed;
  width:38px;
  height:30px;
  pointer-events:none;
  z-index:2;
  animation:butterflyFly linear infinite;
  filter:drop-shadow(0 2px 6px rgba(140,38,65,.25))
}
.butterfly-svg {
  width:100%;
  height:100%;
  overflow:visible
}
.wing-left,.wing-right {
  fill:#f7b7c8;
  stroke:#d64b6b;
  stroke-width:2;
  transform-origin:32px 25px;
  animation:wingFlap .3s ease-in-out infinite alternate
}
.wing-right {
  fill:#f8c8d6
}
.lower {
  fill:#fbd8e2
}
.butterfly-body {
  fill:#8c2641
}
.butterfly-ant {
  fill:none;
  stroke:#8c2641;
  stroke-width:2;
  stroke-linecap:round
}
@keyframes wingFlap {
  0% {
    transform:scaleX(1)
  }
  to {
    transform:scaleX(.72)
  }
}
@keyframes butterflyFly {
  0% {
    transform:translate(-50px,50vh) rotate(-5deg)
  }
  25% {
    transform:translate(25vw,30vh) rotate(10deg)
  }
  50% {
    transform:translate(50vw,60vh) rotate(-8deg)
  }
  75% {
    transform:translate(75vw,25vh) rotate(12deg)
  }
  to {
    transform:translate(110vw,50vh) rotate(-5deg)
  }
}
.gate-wrapper {
  position:relative;
  width:340px;
  height:420px;
  display:flex;
  transition:all .8s ease;
  z-index:3
}
.gate-half {
  width:50%;
  height:100%;
  background:linear-gradient(135deg,#f2c6d2,#e09bb0);
  border:3px solid var(--seal-maroon);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  transition:transform 1.2s cubic-bezier(.65,0,.35,1);
  overflow:hidden;
  box-shadow:0 15px 40px #8c264140
}
.gate-half.left {
  border-radius:14px 0 0 14px;
  border-right:1.5px dashed rgba(140,38,65,.5);
  transform-origin:left center
}
.gate-half.right {
  border-radius:0 14px 14px 0;
  border-left:1.5px dashed rgba(140,38,65,.5);
  transform-origin:right center
}
.gate-half:before {
  content:"";
  position:absolute;
  inset:10px;
  border:1.5px solid rgba(140,38,65,.4);
  border-radius:8px;
  pointer-events:none
}
.gate-letter {
  font-family:Playfair Display,serif;
  font-size:120px;
  font-weight:700;
  font-style:italic;
  background:linear-gradient(180deg,var(--seal-maroon) 0%,#5a1528 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 4px 10px rgba(140,38,65,.15);
  line-height:1;
  filter:drop-shadow(0 2px 3px rgba(255,255,255,.3))
}
.gate-subtitle {
  font-family:Playfair Display,serif;
  font-size:11px;
  letter-spacing:3px;
  color:var(--seal-maroon);
  text-transform:uppercase;
  margin-top:8px;
  font-weight:600;
  text-align:center;
  padding:0 8px
}
.gate-flourish {
  position:absolute;
  width:100%;
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--seal-maroon);
  font-size:20px
}
.gate-flourish.top {
  top:12px
}
.gate-flourish.bottom {
  bottom:12px
}
.gate-heart {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50px;
  height:50px;
  background:linear-gradient(135deg,#d64b6b,#8c2641);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  box-shadow:0 5px 15px #8c264166;
  pointer-events:none;
  animation:heartPulse 2s ease-in-out infinite
}
.gate-heart:before,.gate-heart:after {
  content:"";
  position:absolute;
  width:18px;
  height:28px;
  background:#fff;
  border-radius:18px 18px 0 0;
  top:13px
}
.gate-heart:before {
  left:13px;
  transform:rotate(-45deg);
  transform-origin:0 100%
}
.gate-heart:after {
  right:13px;
  transform:rotate(45deg);
  transform-origin:100% 100%
}
@keyframes heartPulse {
  0%,to {
    transform:translate(-50%,-50%) scale(1)
  }
  50% {
    transform:translate(-50%,-50%) scale(1.08)
  }
}
.gate-wrapper.opened .gate-half.left {
  transform:perspective(800px) rotateY(-105deg)
}
.gate-wrapper.opened .gate-half.right {
  transform:perspective(800px) rotateY(105deg)
}
.gate-wrapper.opened .gate-heart {
  animation:heartFade .5s forwards
}
@keyframes heartFade {
  to {
    opacity:0;
    transform:translate(-50%,-50%) scale(0)
  }
}
.gate-title {
  position:absolute;
  top:-60px;
  left:0;
  right:0;
  width:100%;
  margin:0 auto;
  font-family:Playfair Display,serif;
  font-size:clamp(15px,4.6vw,22px);
  color:var(--rose-pink);
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
  text-align:center;
  white-space:nowrap;
  opacity:0;
  animation:softRise .8s ease .2s forwards
}
.gate-hint {
  position:absolute;
  bottom:-40px;
  left:50%;
  transform:translate(-50%);
  font-size:13px;
  color:#9c8488;
  font-style:italic;
  white-space:nowrap;
  opacity:0;
  animation:softRise .8s ease .5s forwards
}
.gate-wrapper.opened~.gate-hint {
  opacity:0!important
}
.login-card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.9);
  width:90%;
  max-width:360px;
  background:#fffffff2;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  padding:35px 28px;
  border-radius:24px;
  box-shadow:0 15px 40px #8c264126;
  border:1px solid rgba(255,255,255,.7);
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease,transform .6s ease;
  transition-delay:.6s;
  z-index:20
}
.login-card.revealed {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  pointer-events:auto
}
.login-card h2 {
  font-family:Playfair Display,serif;
  color:var(--rose-pink);
  margin-bottom:25px;
  font-size:24px
}
.input-group {
  margin-bottom:18px;
  text-align:left
}
.input-group label {
  font-size:13px;
  color:#6e5d60;
  margin-left:5px;
  display:block;
  margin-bottom:6px;
  font-weight:500
}
.input-group input {
  width:100%;
  padding:13px 16px;
  border:2px solid #f0e2e5;
  border-radius:12px;
  background:#fff;
  font-size:15px;
  outline:none;
  transition:all .3s;
  color:var(--text-dark);
  font-family:inherit
}
.input-group input:focus {
  border-color:var(--envelope-dark-pink);
  box-shadow:0 0 0 4px #f2c6d24d
}
.login-btn {
  width:100%;
  background:var(--seal-maroon);
  color:#fff;
  border:none;
  padding:13px;
  font-size:15px;
  font-weight:600;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 6px 20px #8c264133;
  transition:all .3s;
  margin-top:8px;
  font-family:inherit
}
.login-btn:hover {
  background:#701c32;
  transform:translateY(-2px)
}
.error-msg {
  color:#d32f2f;
  font-size:13px;
  margin-top:12px;
  font-weight:500
}
.error-msg.hidden {
  display:none
}
.cover-card {
  text-align:center;
  padding:40px 20px;
  position:relative;
  width:100%
}
.cover-blossoms {
  margin-bottom:12px;
  opacity:0;
  animation:softRise .8s ease .1s forwards;
  display:flex;
  justify-content:center;
  gap:16px;
  height:34px
}
.cover-blossoms span,.cover-sparkle {
  width:22px;
  height:22px;
  border-radius:50%;
  background:radial-gradient(circle,#fff6fb 0 20%,#f5a8bf 24% 55%,transparent 58%);
  box-shadow:0 -8px #f5a8bf,8px 0 #f5a8bf,0 8px #f5a8bf,-8px 0 #f5a8bf
}
.cover-eyebrow {
  font-size:12px;
  letter-spacing:4px;
  color:var(--accent-gold);
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:8px;
  opacity:0;
  animation:softRise .8s ease .2s forwards
}
.signature-wrap {
  position:relative;
  margin:4px 0 8px;
  padding:10px 0
}
.signature-name {
  font-family:Great Vibes,Dancing Script,cursive;
  font-size:clamp(54px,15vw,88px);
  line-height:1.1;
  display:inline-block;
  background:linear-gradient(100deg,var(--seal-maroon) 10%,var(--rose-pink) 45%,var(--accent-gold) 90%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  filter:drop-shadow(0 6px 14px rgba(140,38,65,.18));
  clip-path:inset(0 100% 0 0);
  animation:signatureReveal 1.6s cubic-bezier(.65,0,.35,1) .4s forwards
}
@keyframes signatureReveal {
  0% {
    clip-path:inset(0 100% 0 0)
  }
  to {
    clip-path:inset(0 0% 0 0)
  }
}
.signature-underline {
  display:block;
  margin:2px auto 0;
  width:220px;
  max-width:70%
}
.signature-underline path {
  fill:none;
  stroke:var(--accent-gold);
  stroke-width:2.5;
  stroke-linecap:round;
  stroke-dasharray:300;
  stroke-dashoffset:300;
  animation:drawUnderline 1s ease-out 1.8s forwards
}
@keyframes drawUnderline {
  to {
    stroke-dashoffset:0
  }
}
.cover-sub {
  font-size:14px;
  letter-spacing:3px;
  color:#8c787b;
  text-transform:uppercase;
  margin-top:18px;
  margin-bottom:40px;
  opacity:0;
  animation:softRise .8s ease 2.2s forwards
}
@keyframes softRise {
  0% {
    opacity:0;
    transform:translateY(10px)
  }
  to {
    opacity:1;
    transform:translateY(0)
  }
}
.cover-sparkle {
  position:absolute;
  opacity:0;
  animation:sparklePop 2.4s ease infinite;
  pointer-events:none
}
.cover-sparkle.s1 {
  top:10px;
  left:18%;
  animation-delay:.4s
}
.cover-sparkle.s2 {
  top:40px;
  right:14%;
  animation-delay:1.1s
}
.cover-sparkle.s3 {
  bottom:90px;
  left:10%;
  animation-delay:1.8s
}
.cover-sparkle.s4 {
  bottom:70px;
  right:16%;
  animation-delay:.9s
}
.cover-sparkle.s5 {
  top:60%;
  left:25%;
  animation-delay:1.5s
}
.cover-sparkle.s6 {
  top:70%;
  right:22%;
  animation-delay:2s
}
@keyframes sparklePop {
  0%,to {
    opacity:0;
    transform:scale(.6) rotate(0)
  }
  50% {
    opacity:.9;
    transform:scale(1.15) rotate(20deg)
  }
}
.read-btn {
  background:transparent;
  color:var(--seal-maroon);
  border:2px solid var(--seal-maroon);
  padding:13px 40px;
  font-size:14px;
  letter-spacing:2.5px;
  border-radius:28px;
  cursor:pointer;
  font-weight:600;
  transition:all .3s;
  opacity:0;
  animation:softRise .8s ease 2.4s forwards;
  font-family:inherit
}
.read-btn:hover {
  background:var(--seal-maroon);
  color:#fff;
  box-shadow:0 8px 22px #8c264140;
  transform:translateY(-2px)
}
.book-container {
  background:#fffdfb;
  background-image:radial-gradient(circle at 20% 10%,rgba(252,196,207,.12) 0%,transparent 40%),radial-gradient(circle at 80% 90%,rgba(197,160,89,.1) 0%,transparent 40%);
  width:100%;
  border-radius:22px;
  padding:40px 28px 25px;
  box-shadow:0 20px 50px #4732371a,0 0 0 1px #f2c6d266,0 0 0 5px #fffdfb,0 0 0 6px #c5a05959;
  position:relative;
  height:720px;
  max-height:calc(100vh - 70px);
  display:flex;
  flex-direction:column
}
.book-corner {
  position:absolute;
  width:24px;
  height:24px;
  color:var(--accent-gold);
  opacity:.7;
  pointer-events:none;
  z-index:1
}
.book-corner:before,.book-corner:after {
  content:"";
  position:absolute;
  background:var(--accent-gold);
  border-radius:999px
}
.book-corner:before {
  width:22px;
  height:2px;
  top:11px;
  left:1px
}
.book-corner:after {
  width:2px;
  height:22px;
  top:1px;
  left:11px
}
.book-corner.tl {
  top:10px;
  left:12px
}
.book-corner.tr {
  top:10px;
  right:12px;
  transform:scaleX(-1)
}
.book-corner.bl {
  bottom:10px;
  left:12px;
  transform:scaleY(-1)
}
.book-corner.br {
  bottom:10px;
  right:12px;
  transform:scale(-1)
}
.book-container:before,.book-container:after {
  content:"";
  position:absolute;
  left:22px;
  right:22px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-gold) 30%,var(--envelope-dark-pink) 50%,var(--accent-gold) 70%,transparent);
  opacity:.5
}
.book-container:before {
  top:38px
}
.book-container:after {
  bottom:88px
}
.top-deco-section {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:-10px;
  margin-bottom:8px;
  animation:slowFloatTop 4s infinite ease-in-out
}
.top-deco-section span,.chapter-deco-top:before,.chapter-deco-top:after {
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--accent-gold);
  display:inline-block;
  box-shadow:0 0 0 4px #c5a05929
}
@keyframes slowFloatTop {
  0%,to {
    transform:translateY(0);
    opacity:.8
  }
  50% {
    transform:translateY(-4px);
    opacity:1
  }
}
.chapter-header {
  text-align:center;
  margin-bottom:22px;
  position:relative;
  padding:4px 0 12px
}
.chapter-deco-top {
  height:12px;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:48px;
  opacity:0;
  animation:decoRise .6s ease .1s forwards
}
@keyframes decoRise {
  0% {
    opacity:0;
    transform:translateY(-6px)
  }
  to {
    opacity:.75;
    transform:translateY(0)
  }
}
.chapter-num {
  font-family:Poppins,sans-serif;
  font-size:10px;
  letter-spacing:3px;
  color:var(--accent-gold);
  text-transform:uppercase;
  font-weight:600;
  display:block;
  margin-bottom:4px;
  position:relative
}
.chapter-title {
  font-family:Playfair Display,serif;
  font-size:26px;
  font-weight:700;
  font-style:italic;
  background:linear-gradient(100deg,var(--seal-maroon) 0%,var(--rose-pink) 50%,var(--accent-gold) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  line-height:1.2;
  margin-bottom:6px;
  opacity:0;
  animation:titleFade .7s cubic-bezier(.22,1,.36,1) .15s forwards
}
@keyframes titleFade {
  0% {
    opacity:0;
    transform:translateY(-8px);
    letter-spacing:4px
  }
  to {
    opacity:1;
    transform:translateY(0);
    letter-spacing:normal
  }
}
.chapter-title-underline {
  display:block;
  margin:0 auto;
  width:140px;
  height:12px;
  opacity:0;
  animation:decoRise .6s ease .4s forwards
}
.chapter-title-underline path {
  fill:none;
  stroke:var(--accent-gold);
  stroke-width:1.5;
  stroke-linecap:round
}
.content-wrapper {
  flex-grow:1;
  position:relative;
  overflow-y:auto;
  min-height:0;
  display:flex;
  align-items:stretch;
  padding-right:4px;
  scrollbar-width:thin;
  scrollbar-color:rgba(224,155,176,.7) transparent
}
.content-wrapper::-webkit-scrollbar {
  width:4px
}
.content-wrapper::-webkit-scrollbar-thumb {
  background:#e09bb0b3;
  border-radius:999px
}
.chapter-content {
  font-size:14.5px;
  line-height:1.75;
  color:#4a3e40;
  text-align:justify;
  display:none;
  opacity:0;
  transform:translate(15px);
  transition:all .4s ease;
  width:100%
}
.chapter-content.active {
  display:block;
  opacity:1;
  transform:translate(0)
}
.chapter-content.active p,.chapter-content.active .highlight-box,.chapter-content.active .info-grid,.chapter-content.active .phone-highlight,.chapter-content.active .chapter-image,.chapter-content.active .whatsapp-container {
  opacity:0;
  transform:translateY(12px);
  animation:textFadeIn .7s cubic-bezier(.22,1,.36,1) forwards
}
.chapter-content.active p:nth-child(1) {
  animation-delay:.1s
}
.chapter-content.active p:nth-child(2) {
  animation-delay:.25s
}
.chapter-content.active p:nth-child(3) {
  animation-delay:.4s
}
.chapter-content.active p:nth-child(4) {
  animation-delay:.55s
}
.chapter-content.active p:nth-child(5) {
  animation-delay:.7s
}
.chapter-content.active p:nth-child(6) {
  animation-delay:.85s
}
.chapter-content.active p:nth-child(7) {
  animation-delay:1s
}
.chapter-content.active p:nth-child(8) {
  animation-delay:1.15s
}
.chapter-content.active p:nth-child(9) {
  animation-delay:1.3s
}
.chapter-content.active p:nth-child(10) {
  animation-delay:1.45s
}
.chapter-content.active .highlight-box {
  animation-delay:.3s
}
.chapter-content.active .info-grid,.chapter-content.active .phone-highlight,.chapter-content.active .chapter-image {
  animation-delay:.55s
}
.chapter-content.active .whatsapp-container {
  animation-delay:1s
}
@keyframes textFadeIn {
  0% {
    opacity:0;
    transform:translateY(12px)
  }
  to {
    opacity:1;
    transform:translateY(0)
  }
}
.chapter-content p {
  margin-bottom:14px
}
.highlight-box {
  background:#fdf8f5;
  border-left:3px solid var(--envelope-dark-pink);
  padding:12px 15px;
  border-radius:0 8px 8px 0;
  font-style:italic;
  color:#5c4b4d;
  font-size:14px
}
.chapter-image {
  width:100%;
  max-width:340px;
  max-height:260px;
  margin:18px auto;
  display:block;
  object-fit:contain;
  background:#fff7f3;
  border-radius:14px;
  box-shadow:0 10px 25px #8c264126;
  border:3px solid #fdf7f8
}
.phone-highlight {
  background:linear-gradient(135deg,#fdf7f8,#fde4ea);
  border:2px solid var(--envelope-dark-pink);
  border-radius:12px;
  padding:14px 18px;
  text-align:center;
  margin:14px 0;
  font-weight:600;
  color:var(--seal-maroon);
  font-size:15px
}
.phone-highlight .flag {
  font-size:18px;
  margin:0 4px
}
.animal-section {
  display:flex;
  justify-content:center;
  align-items:center;
  height:80px;
  margin-top:10px;
  margin-bottom:8px;
  z-index:2
}
.animal-emoji {
  width:82px;
  height:76px;
  display:inline-block;
  filter:drop-shadow(0px 4px 10px rgba(140,38,65,.18));
  animation:gentleSwayingPet 4s infinite ease-in-out;
  -webkit-user-select:none;
  user-select:none
}
.cute-animal-svg {
  width:100%;
  height:100%;
  display:block
}
.animal-emoji.pop-in {
  animation:peekEffect .6s cubic-bezier(.34,1.56,.64,1) forwards
}
@keyframes peekEffect {
  0% {
    transform:translateY(40px) scale(.5);
    opacity:0
  }
  70% {
    transform:translateY(-8px) scale(1.1);
    opacity:1
  }
  to {
    transform:translateY(0) scale(1)
  }
}
@keyframes gentleSwayingPet {
  0%,to {
    transform:rotate(0)
  }
  50% {
    transform:rotate(4deg)
  }
}
.book-nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:12px;
  z-index:5;
  min-height:40px;
  margin-top:8px
}
.nav-link {
  font-size:14px;
  color:#a89497;
  background:none;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:all .3s ease;
  padding:5px 10px;
  min-width:60px;
  font-family:inherit
}
.nav-link:hover:not(:disabled):not(.finished) {
  color:var(--text-dark)
}
.nav-link:disabled {
  opacity:0;
  visibility:hidden
}
.nav-link.finished {
  color:var(--rose-pink);
  opacity:1;
  visibility:visible;
  cursor:default;
  transform:scale(1.05)
}
.dots-indicator {
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:180px
}
.dot {
  width:6px;
  height:6px;
  background:#e0d5d7;
  border-radius:50%;
  transition:all .3s
}
.dot.active {
  background:var(--envelope-dark-pink);
  transform:scale(1.5)
}
.whatsapp-btn {
  background:#25d366;
  color:#fff;
  border:none;
  padding:12px 22px;
  border-radius:28px;
  font-size:14px;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 5px 15px #25d3664d;
  transition:all .3s;
  margin:12px 6px 4px;
  font-family:inherit
}
.whatsapp-btn:hover {
  background:#20ba59;
  transform:translateY(-2px)
}
.restart-btn {
  background:transparent;
  color:var(--seal-maroon);
  border:2px solid var(--seal-maroon);
  padding:11px 22px;
  border-radius:28px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:1.5px;
  transition:all .3s;
  margin:12px 6px 4px;
  font-family:inherit
}
.restart-btn:hover {
  background:var(--seal-maroon);
  color:#fff;
  box-shadow:0 8px 18px #8c264140
}
.final-buttons {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:4px;
  margin-top:8px
}
.whatsapp-container {
  text-align:center;
  width:100%
}
.music-toggle {
  position:fixed;
  top:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:#ffffffd9;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(224,155,176,.5);
  box-shadow:0 8px 20px #8c264126;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:200;
  transition:all .3s ease
}
.music-toggle:hover {
  transform:scale(1.08);
  box-shadow:0 10px 24px #8c264140
}
.music-toggle svg {
  width:22px;
  height:22px;
  color:var(--seal-maroon)
}
.music-toggle .icon-pause,.music-toggle.playing .icon-play {
  display:none
}
.music-toggle.playing .icon-pause {
  display:block
}
.music-toggle.playing {
  animation:musicPulse 1.6s ease-in-out infinite
}
@keyframes musicPulse {
  0%,to {
    box-shadow:0 8px 20px #8c264126
  }
  50% {
    box-shadow:0 8px 26px #d64b6b66
  }
}
.music-bars {
  position:absolute;
  bottom:6px;
  display:flex;
  gap:2px;
  align-items:flex-end;
  height:8px;
  opacity:0;
  transition:opacity .2s ease
}
.music-toggle.playing .music-bars {
  opacity:1
}
.music-bars span {
  width:2px;
  background:var(--rose-pink);
  animation:barBounce .9s ease-in-out infinite
}
.music-bars span:nth-child(1) {
  animation-delay:0s
}
.music-bars span:nth-child(2) {
  animation-delay:.2s
}
.music-bars span:nth-child(3) {
  animation-delay:.4s
}
@keyframes barBounce {
  0%,to {
    height:3px
  }
  50% {
    height:8px
  }
}
@media(max-width:480px) {
  .book-container {
    padding:32px 18px 20px;
    height:88vh;
    max-height:760px
  }
  .chapter-title {
    font-size:22px
  }
  .chapter-content {
    font-size:13.5px
  }
  .chapter-image {
    max-height:210px
  }
  .book-corner {
    font-size:18px
  }
  .gate-wrapper {
    width:290px;
    height:360px
  }
  .gate-letter {
    font-size:95px
  }
  .gate-title {
    top:-55px
  }
  .flower-deco {
    width:26px;
    height:26px
  }
  .music-toggle {
    width:44px;
    height:44px;
    top:14px;
    right:14px
  }
  .animal-emoji {
    width:68px;
    height:64px
  }
  .signature-name {
    font-size:clamp(46px,13vw,70px)
  }
  .dots-indicator {
    max-width:140px
  }
}
</style>
</head>
<body>

  <!-- floating petals + butterflies (added by script.js) -->
  <div class="petals-container" id="petalsContainer"></div>

  <!-- background music -->
  <audio id="bgm" src="audio/love-letter-song.mp3" loop></audio>

  <!-- music play/pause button -->
  <button class="music-toggle" id="musicToggle" title="Play background music" aria-label="Toggle background music">
    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
    <div class="music-bars"><span></span><span></span><span></span></div>
  </button>

  <!-- ============ SCREEN 1: LOGIN GATE ============ -->
  <section class="screen active" id="screenLogin">
    <div class="login-stage">
      <span class="flower-deco f1"></span>
      <span class="flower-deco f2"></span>
      <span class="flower-deco f3"></span>
      <span class="flower-deco f4"></span>
      <span class="flower-deco f5"></span>
      <span class="flower-deco f6"></span>
      <span class="flower-deco f7"></span>
      <span class="flower-deco f8"></span>

      <div class="gate-wrapper" id="gateWrapper">
        <div class="gate-title">A Letter Has Arrived</div>

        <div class="gate-half left" id="gateHalfLeft">
          <div class="gate-flourish top">❀</div>
          <div class="gate-letter">S</div>
          <div class="gate-subtitle">&amp;</div>
          <div class="gate-flourish bottom">❀</div>
        </div>

        <div class="gate-half right" id="gateHalfRight">
          <div class="gate-flourish top">❀</div>
          <div class="gate-letter">K</div>
          <div class="gate-subtitle">Forever</div>
          <div class="gate-flourish bottom">❀</div>
        </div>

        <div class="gate-heart" id="gateHeart" aria-hidden="true"></div>

        <div class="gate-hint" id="gateHint">touch the gate to open ✦</div>

        <div class="login-card" id="loginCard">
          <h2>Welcome Back</h2>

          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username..." autocomplete="off">
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password...">
          </div>

          <button class="login-btn" id="loginBtn">Unlock Letter</button>

          <div class="error-msg hidden" id="loginError">Incorrect Username or Password. Please try again.</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ SCREEN 2: COVER ============ -->
  <section class="screen" id="screenCover">
    <div class="cover-card">
      <span class="cover-sparkle s1"></span>
      <span class="cover-sparkle s2"></span>
      <span class="cover-sparkle s3"></span>
      <span class="cover-sparkle s4"></span>
      <span class="cover-sparkle s5"></span>
      <span class="cover-sparkle s6"></span>

      <div class="cover-blossoms" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

      <div class="cover-eyebrow">a letter, just for you</div>

      <div class="signature-wrap">
        <span class="signature-name">Hi Kithuni, 🌸</span>
        <svg class="signature-underline" viewBox="0 0 220 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12 C 60 2, 160 2, 215 13"/>
        </svg>
      </div>

      <p class="cover-sub">A little something for you</p>

      <button class="read-btn" id="readBtn">READ THE LETTER</button>
    </div>
  </section>

  <!-- ============ SCREEN 3: BOOK ============ -->
  <section class="screen" id="screenBook">
    <div class="book-container">
      <div class="top-deco-section" aria-hidden="true"><span></span><span></span><span></span></div>

      <span class="book-corner tl" aria-hidden="true"></span>
      <span class="book-corner tr" aria-hidden="true"></span>
      <span class="book-corner bl" aria-hidden="true"></span>
      <span class="book-corner br" aria-hidden="true"></span>

      <div class="chapter-header">
        <span class="chapter-deco-top" aria-hidden="true"></span>
        <span class="chapter-num" id="chapterNum">Page 2</span>
        <h2 class="chapter-title" id="chapterTitle">A Sweet Surprise</h2>
        <svg class="chapter-title-underline" viewBox="0 0 140 12" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 C 30 2, 50 10, 70 6 S 110 2, 135 6"/>
        </svg>
      </div>

      <div class="content-wrapper">
        <div class="chapter-content active" id="chapterContent"></div>
      </div>

      <div class="animal-section">
        <span class="animal-emoji" id="animalEmoji"></span>
      </div>

      <div class="book-nav">
        <button class="nav-link" id="backBtn">Back</button>
        <div class="dots-indicator" id="dotsIndicator"></div>
        <button class="nav-link" id="nextBtn">Next</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
